{% extends "base.html" %}

{% block title %}Listings{% endblock %}

{% block content %}
    <div class="header_text">
        <h2>Results:</h2>
    </div>

    <div class="results-container">
        <div class="results-row">
            <div class="result-box">Item 1</div>
            <div class="result-box">Item 2</div>
            <div class="result-box">Item 3</div>
            <div class="result-box">Item 4</div>
        </div>
        <div class="results-row">
            <div class="result-box">Item 5</div>
            <div class="result-box">Item 6</div>
            <div class="result-box">Item 7</div>
            <div class="result-box">Item 8</div>
        </div>
        <div class="results-row">
            <div class="result-box">Item 9</div>
            <div class="result-box">Item 10</div>
            <div class="result-box">Item 11</div>
            <div class="result-box">Item 12</div>
        </div>
        <div class="results-row">
            <div class="result-box">Item 13</div>
            <div class="result-box">Item 14</div>
            <div class="result-box">Item 15</div>
            <div class="result-box">Item 16</div>
        </div>
    </div>

    <style>
        .results-container {
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .results-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .result-box {
            flex: 1;
            margin: 0 10px;
            padding: 20px;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 5px;
            text-align: center;
        }
    </style>

{% endblock %}
