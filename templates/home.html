{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}

    <div class="header_text">
        <h2>Niner Exchange</h2>
    </div>
    {% if session['username'] %}
    <div class="right">
        <button class="button"> Create Listing! </button>
    </div>
    {% else %}
    <div class="right">

    </div>
    {% endif %}

    <div class="center_input">
        <form action="{{ url_for('listings') }}" method="GET">
            <input class="text_box" name="query" placeholder="Search..."></input>
            <button type="submit" class="button">Search!</button>
        </form>
    </div>

{% endblock %}
